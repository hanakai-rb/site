name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        name: Setup Node
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Types
        run: npm run lint:types
      - name: Formatting
        run: npm run lint:format
      - name: Herb linting
        run: npm run lint:herb

  test-js:
    name: Test (JS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        name: Setup Node
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        name: Setup Node
        with:
          node-version: "22.15.0"
          cache: npm
      - run: npm ci

      - name: Restore og:image cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: tmp/og_images/cache
          key: og-cache-${{ hashFiles('bin/og_images/**', 'app/assets/fonts/**/*.woff2', 'package-lock.json') }}
          restore-keys: og-cache-

      - name: Static build
        env:
          SITE_URL: ${{ github.event_name == 'pull_request' && format('https://pr-{0}--hanakai.netlify.app', github.event.number) || 'https://hanakai.org' }}
          TINYLYTICS_SITE_ID: o3yxA7q1wR3rjNYiCd84
        run: bin/static-build

      - name: Rake
        run: bundle exec rake

      - name: Herb Analyze (Parse+Compile)
        run: "bundle exec herb analyze"

      - name: Upload build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-files
          path: build/
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test-js, build]
    if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: build-files
          path: build/

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.15.0"

      - name: Deploy to Netlify
        id: deploy
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            npx netlify-cli@latest deploy --prod --dir=build --message="Production deploy @ ${{ github.sha }}"
          else
            DEPLOY_URL=$(npx netlify-cli@latest deploy --dir=build --alias=pr-${{ github.event.number }} --json --message="Deploy preview #${{ github.event.number }} ${GITHUB_EVENT_PULL_REQUEST_TITLE} @ ${{ github.sha }}" | jq -r '.deploy_url')
            echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          GITHUB_EVENT_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}

      - name: Add comment
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deploy_url
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          message: "❇️ **Deploy preview:** ${{ steps.deploy.outputs.deploy_url }}"

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1.2.1
